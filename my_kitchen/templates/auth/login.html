{% extends "base.html" %}
{% block title %}Log in — My Kitchen{% endblock %}
{% block content %}
  <div class="home-hero" style="padding-bottom:var(--space-4)">
    <h1 class="display" style="font-size:clamp(2.4rem,11vw,3.8rem);margin:0">My Kitchen</h1>
  </div>
  <div class="card" style="max-width:420px;margin:0 auto">
    <h2>Log in</h2>
    <form class="form" method="post" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="{{ next }}">
      <label>Name <input type="text" name="name" required autofocus></label>
      <label>Password <input type="password" name="password" required></label>
      <div class="form-actions">
        <button type="submit" class="btn btn--primary btn--block">Log in</button>
      </div>
    </form>
  </div>
{% endblock %}
