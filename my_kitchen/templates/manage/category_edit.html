{% extends "base.html" %}
{% block title %}Edit {{ cat.name }} — My Kitchen{% endblock %}
{% block content %}
  <h1>Edit category</h1>
  <p><a href="{{ url_for('manage.categories') }}">&larr; Categories</a></p>
  <form method="post" action="{{ url_for('manage.category_edit', category_id=cat.id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Name: <input type="text" name="name" value="{{ cat.name }}" required></label>
    <label>Section:
      <select name="section" required>
        {% for key, label in sections %}
          <option value="{{ key }}" {% if key == cat.section %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Order: <input type="number" name="display_order" value="{{ cat.display_order }}" style="width:4em"></label>
    <p>
      <a href="{{ url_for('manage.categories') }}">Cancel</a>
      <button type="submit">Save</button>
    </p>
  </form>
  <p><small>Changing the section moves this category's ingredients into a
     different cook-wizard lane.</small></p>
{% endblock %}
