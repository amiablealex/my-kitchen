{% extends "base.html" %}
{% from "_icons.html" import icon %}
{% block title %}Edit {{ item.name }} — My Kitchen{% endblock %}
{% block page_title %}Edit equipment{% endblock %}
{% block content %}
  <a class="back-link" href="{{ url_for('manage.equipment') }}">{{ icon('arrow_back') }} Equipment</a>
  <h1>Edit equipment</h1>
  <form class="form" method="post" action="{{ url_for('manage.equipment_edit', equipment_id=item.id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Name <input type="text" name="name" value="{{ item.name }}" required></label>
    <label><input type="checkbox" name="is_available" {% if item.is_available %}checked{% endif %}> Available</label>
    <div class="form-actions">
      <a class="btn btn--secondary" href="{{ url_for('manage.equipment') }}">Cancel</a>
      <button type="submit" class="btn btn--primary">Save</button>
    </div>
  </form>
{% endblock %}
