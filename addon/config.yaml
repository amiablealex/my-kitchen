name: My Kitchen
version: "0.14.0"
slug: my_kitchen
description: Self-hosted household recipe generator (LLM-powered).
url: https://github.com/amiablealex/my-kitchen
arch:
  - aarch64
  - amd64
startup: application
boot: auto

# Primary access is HA ingress (HTTPS, sidebar panel, no exposed port needed).
ingress: true
ingress_port: 8000            # the internal port gunicorn listens on
panel_icon: mdi:pot-steam     # on-brand-ish; swap for any Material Design icon
panel_title: My Kitchen
panel_admin: false

# Optional direct-LAN access (plain HTTP; reach it by typing host:port). The PWA
# only fully comes alive over the HTTPS ingress URL, not here.
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Direct LAN access (plain HTTP; PWA needs the HTTPS ingress URL)

options:
  llm_provider: gemini
  llm_model: ""
  gemini_api_key: ""
  anthropic_api_key: ""
  llm_temperature: 0.8
  llm_max_tokens: 8000
  llm_recent_titles_n: 10
  app_timezone: Europe/London
  gunicorn_workers: 2
  gunicorn_threads: 4

schema:
  llm_provider: "list(mock|gemini|anthropic)"
  llm_model: "str?"
  gemini_api_key: "password?"
  anthropic_api_key: "password?"
  llm_temperature: "float(0,2)"
  llm_max_tokens: "int(256,32000)"
  llm_recent_titles_n: "int(0,50)"
  app_timezone: "str"
  gunicorn_workers: "int(1,8)"
  gunicorn_threads: "int(1,16)"
